services:
  postgres:
    image: postgres:16
    container_name: toychart-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: toychart
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Abcd1234
    ports:
      - "5432:5432"
    volumes:
      - toychart-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d toychart"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  toychart-postgres-data:
