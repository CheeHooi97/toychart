root = "."
tmp_dir = "tmp"

[build]
cmd = "cd backend && go build -o ../tmp/toychart-api ."
bin = "./tmp/toychart-api"
full_bin = "./tmp/toychart-api"
include_ext = ["go", "tpl", "tmpl", "html", "env"]
exclude_dir = ["tmp", "vendor", ".git"]
include_dir = ["backend"]
delay = 1000
stop_on_error = true
send_interrupt = true
kill_delay = "500ms"

[log]
time = true

[misc]
clean_on_exit = true
